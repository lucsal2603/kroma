name: Campagna email automatica

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Chiama il backend KROMA
        run: |
          curl -sS -X POST "https://kroma-backend.onrender.com/marketing/cron" \
            -H "x-cron-key: ${{ secrets.MARKETING_CRON_KEY }}"
